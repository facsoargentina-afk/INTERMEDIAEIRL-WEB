<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INTERMEDIA EIRL | Finanzas Estructuradas</title>
    <style>
        :root {
            /* COLOR EXACTO DEL LOGO CIRCULAR */
            --navy-bg: #0a121e; 
            --gold: #b8934d;
            --off-white: #fcfcfc;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            background-color: var(--off-white); 
        }

        header { 
            background-color: var(--navy-bg);
            padding: 60px 20px 100px;
            text-align: center;
            clip-path: polygon(0 0, 100% 0, 100% 90%, 0 100%);
        }

        .logo-web { 
            width: 100%;
            max-width: 320px; 
            height: auto; 
            display: block;
            margin: 0 auto;
        }

        .hero-text h1 { 
            color: white; 
            font-size: 3rem; 
            margin: 15px 0 5px; 
            font-weight: 700;
        }
        
        .hero-text p { 
            color: var(--gold); 
            font-size: 1.1rem; 
            font-weight: 600; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
        }

        .main-content { 
            max-width: 1100px; 
            margin: -50px auto 60px; 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 20px;
            padding: 0 20px;
        }

        .feature-box {
            background: white;
            padding: 40px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-bottom: 4px solid var(--gold);
        }

        .action-area { text-align: center; padding: 40px; }

        .btn-modern {
            background: #0a121e;
            color: white;
            padding: 20px 50px;
            text-decoration: none;
            font-weight: 700;
            display: inline-block;
            text-transform: uppercase;
        }

        footer { background: #0a121e; color: white; padding: 60px 20px; text-align: center; }
    </style>
</head>
