<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INTERMEDIA EIRL | Finanzas Estructuradas</title>
    <style>
        header { 
            background-color: #ffffff; /* Blanco puro para camuflar el fondo del logo */
            padding: 60px 20px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        .logo-web { 
            max-width: 280px; 
            height: auto; 
            display: block;
            margin: 0 auto;
        }

        .hero-text h1 { 
            color: #0a121e; 
            font-size: 2.8rem; 
            margin: 20px 0 5px; 
            font-family: sans-serif;
        }
        
        .hero-text p { 
            color: #b8934d; 
            font-size: 1rem; 
            text-transform: uppercase; 
            letter-spacing: 5px; 
            font-family: sans-serif;
        }
    </style>
</head>
<body>

<header>
    <img src="logo-red.png" alt="INTERMEDIA EIRL" class="logo-web">
    <div class="hero-text">
        <h1>INTERMEDIA EIRL</h1>
        <p>Estructuración de Negocios</p>
    </div>

</html>
